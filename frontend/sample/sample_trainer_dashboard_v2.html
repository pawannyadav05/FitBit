<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge Trainer Dashboard - V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --accent: #c6ff00;
            --bg-main: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #888888;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin: 25px auto; width: 95%; max-width: 1400px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 50px; }
        .dashboard-wrapper { width: 100%; max-width: 1500px; display: grid; grid-template-columns: 320px 1fr; gap: 30px; padding: 0 20px; }
        .profile-col { display: flex; flex-direction: column; gap: 20px; }
        .profile-card { padding: 40px 30px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .avatar-ring { width: 130px; height: 130px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, var(--accent), #222); margin-bottom: 20px; }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .profile-name { font-size: 1.6rem; font-weight: 700; margin: 0 0 5px 0; }
        .profile-id { color: var(--text-dim); font-size: 0.95rem; margin: 0 0 25px 0; }
        .status-badge { background: rgba(198, 255, 0, 0.1); color: var(--accent); padding: 8px 20px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; border: 1px solid rgba(198, 255, 0, 0.2); }
        
        /* TEAM PROGRESS BAR INSTEAD OF QR */
        .team-progress { margin-top: 30px; width: 100%; text-align: left; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .progress-container { height: 8px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 85%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .main-col { display: flex; flex-direction: column; gap: 30px; }
        .clients-card { padding: 30px; }
        .clients-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .clients-table th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 0.85rem; border-bottom: 1px solid var(--glass-border); text-transform: uppercase; letter-spacing: 1px; }
        .clients-table td { padding: 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.95rem; }
        
        .bmi-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .bmi-normal { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .bmi-overweight { background: rgba(255, 136, 0, 0.1); color: #ff8800; border: 1px solid rgba(255, 136, 0, 0.2); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-size: 1.5rem; font-weight: 800;">FitForge <span style="font-size: 0.7rem; padding: 4px 10px; background: rgba(198,255,0,0.1); color: var(--accent); border-radius: 20px;">TRAINER</span></div>
        <button style="background: transparent; border: 1px solid var(--glass-border); color: #fff; padding: 8px 20px; border-radius: 20px;">Logout</button>
    </nav>

    <div class="dashboard-wrapper">
        <div class="profile-col">
            <div class="glass profile-card">
                <div class="avatar-ring"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Trainer" style="width:100%; border-radius:50%;"></div>
                <h2 class="profile-name">Coach Sarah</h2>
                <p class="profile-id">sarah@fitforge.com</p>
                <div class="status-badge">Senior Coach</div>

                <div class="team-progress">
                    <div class="progress-label">
                        <span>Team Goal Success</span>
                        <span style="color: var(--accent);">85%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill"></div>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.7rem; color: var(--text-dim);">12 of 14 clients are on track this week!</p>
                </div>
            </div>
        </div>

        <div class="main-col">
            <div class="glass clients-card">
                <h3 style="margin: 0;">My Active Clients</h3>
                <table class="clients-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Weight</th>
                            <th>BMI Status</th>
                            <th>Streak</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Mark R.</td>
                            <td>92.4kg</td>
                            <td><span class="bmi-badge bmi-overweight">Overweight</span></td>
                            <td style="color: var(--accent); font-weight: 700;">8 Days</td>
                            <td><button style="background: transparent; border: 1px solid var(--glass-border); color: #fff; padding: 5px 15px; border-radius: 50px; cursor: pointer;">Chat</button></td>
                        </tr>
                        <tr>
                            <td>Julia S.</td>
                            <td>62.1kg</td>
                            <td><span class="bmi-badge bmi-normal">Normal</span></td>
                            <td style="color: var(--accent); font-weight: 700;">21 Days</td>
                            <td><button style="background: transparent; border: 1px solid var(--glass-border); color: #fff; padding: 5px 15px; border-radius: 50px; cursor: pointer;">Chat</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

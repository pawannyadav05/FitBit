<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - FitForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.header h2 {
    color: #c6ff00;
}

.logout {
    color: red;
    cursor: pointer;
}

/* Container */
.container {
    padding: 20px 40px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
}

button {
    padding: 6px 12px;
    border: none;
    cursor: pointer;
}

.assign-btn {
    background: #c6ff00;
}

.delete-btn {
    background: red;
    color: white;
}

/* NEW: input styling */
input {
    padding: 8px;
    margin: 5px;
}
</style>
</head>

<body>

<div class="header">
    <h2>FitForge Admin</h2>
    <p class="logout">Logout</p>
</div>

<div class="container">

    <!-- ✅ NEW SECTION (ADDED) -->
    <h3>Create Trainer</h3>
    <input id="trainerNameInput" placeholder="Trainer Name">
    <input id="trainerEmailInput" placeholder="Trainer Email">
    <input id="trainerPasswordInput" placeholder="Password">
    <button onclick="createTrainer()" class="assign-btn">Create Trainer</button>

    <!-- EXISTING -->
    <h3>Users</h3>
    <table id="userTable"></table>

    <h3>Trainers</h3>
    <table id="trainerTable"></table>

</div>

<script src="js/admin.js"></script>

</body>
</html>

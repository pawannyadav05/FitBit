<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitForge Trainer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
* {
    box-sizing: border-box;
}

:root {
    --accent: #c6ff00;
    --bg-main: #050505;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-dim: #888888;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    padding: 0 0 40px 0;
}

/* Glassmorphism utility */
.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
}

/* Navbar - Floating Pill Design */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    margin: 25px auto 40px auto;
    width: 95%;
    max-width: 1400px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    position: sticky;
    top: 25px;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
}

.badge-trainer {
    font-size: 0.65rem;
    padding: 4px 10px;
    background: rgba(198, 255, 0, 0.1);
    color: var(--accent);
    border: 1px solid rgba(198, 255, 0, 0.2);
    border-radius: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-top: 3px;
}

.logout-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-main);
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s ease;
}

.logout-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #ff4d4d;
    border-color: rgba(255, 77, 77, 0.5);
}

.dashboard-wrapper {
    width: 100%;
    max-width: 1500px;
    display: grid;
    grid-template-columns: 320px 1fr 380px;
    gap: 30px;
    padding: 0 20px;
}

/* Left Column: Profile */
.profile-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.profile-card {
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.avatar-ring {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, var(--accent), #222);
    margin-bottom: 20px;
}

.avatar-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    background: #111;
}

.profile-name {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0 0 5px 0;
}

.profile-id {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin: 0 0 25px 0;
}

.status-badge {
    background: rgba(198, 255, 0, 0.1);
    color: var(--accent);
    padding: 8px 20px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid rgba(198, 255, 0, 0.2);
}

.qr-box {
    margin-top: 40px;
    background: white;
    padding: 15px;
    border-radius: 16px;
}
#qrCode {
    width: 160px !important;
    height: 160px !important;
}

/* Middle Column: Main Content */
.main-col {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.section-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0 0 15px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}
.section-title span {
    background: var(--accent);
    color: #000;
    padding: 2px 10px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 800;
}

/* Pending Request Cards */
.pending-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.pending-card {
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.pending-user {
    display: flex;
    align-items: center;
    gap: 15px;
}

.pending-user img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #333;
}

.pending-user h4 {
    margin: 0 0 3px 0;
    font-size: 1.05rem;
}

.pending-user p {
    margin: 0;
    font-size: 0.85rem;
    color: var(--text-dim);
}

.weight-update {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 12px;
}

.weight-val {
    font-size: 1.2rem;
    font-weight: 700;
}

.weight-arrow {
    color: var(--accent);
    font-weight: 800;
}

.pending-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.btn-approve, .btn-reject {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
}

.btn-approve {
    background: var(--accent);
    color: #000;
}

.btn-reject {
    background: rgba(255, 77, 77, 0.1);
    color: #ff4d4d;
    border: 1px solid rgba(255, 77, 77, 0.2);
}

.btn-approve:hover, .btn-reject:hover {
    transform: translateY(-2px);
}

/* Clients Table */
.clients-card {
    padding: 30px;
}

.clients-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.clients-table th {
    text-align: left;
    padding: 15px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--glass-border);
}

.clients-table td {
    padding: 15px;
    border-bottom: 1px solid var(--glass-border);
    vertical-align: middle;
}

.client-info {
    display: flex;
    align-items: center;
    gap: 15px;
}
.client-info img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}
.client-info div p {
    margin: 0;
}
.client-name {
    font-weight: 600;
    font-size: 1rem;
}
.client-email {
    font-size: 0.8rem;
    color: var(--text-dim);
}

.btn-chat {
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--glass-border);
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
}
.btn-chat:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
}

/* Right Column: Integrated Chat */
.chat-col {
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateX(20px);
    position: sticky;
    top: 40px;
    height: calc(100vh - 80px);
}

.dashboard-wrapper.chat-open .chat-col {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
}

.chat-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
}

.chat-header {
    padding: 25px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 15px;
}

.chat-header-avatar {
    width: 45px;
    height: 45px;
    background: #333;
    border-radius: 50%;
}

.chat-header-info h4 {
    margin: 0 0 4px 0;
    font-size: 1.1rem;
}

.chat-messages {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    min-height: 400px;
}

.msg {
    max-width: 85%;
    padding: 14px 20px;
    border-radius: 20px;
    font-size: 0.95rem;
    line-height: 1.5;
}

.msg.user {
    background: rgba(255,255,255,0.08);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
}

.msg.trainer {
    background: var(--accent);
    color: #000;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
}

.chat-input-area {
    padding: 20px;
    border-top: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 15px;
}

.chat-input-area input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--glass-border);
    color: white;
    padding: 16px 25px;
    border-radius: 50px;
    outline: none;
    font-size: 1rem;
}

.chat-send {
    background: var(--accent);
    color: #000;
    border: none;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
}
.chat-send:hover {
    transform: scale(1.05);
}

/* Responsive */
@media (max-width: 1200px) {
    .dashboard-wrapper {
        grid-template-columns: 1fr;
    }
    .pending-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div style="width: 100%; display: flex; flex-direction: column;">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            FitForge <span class="badge-trainer">TRAINER</span>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="dashboard-wrapper" id="dashboardWrapper">

        <!-- Left Column: Profile -->
        <div class="profile-col">
            <div class="glass profile-card">
                <div class="avatar-ring">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Trainer" alt="Trainer Avatar">
                </div>
                <h2 class="profile-name" id="trainerName">Coach Name</h2>
                <p class="profile-id" id="trainerId">trainer@email.com</p>
                <div class="status-badge" id="status">Active</div>

                <div class="qr-box">
                    <canvas id="qrCode"></canvas>
                </div>
            </div>
        </div>

        <!-- Middle Column: Main Content -->
        <div class="main-col">
            
            <!-- Pending Approvals -->
            <div>
                <h3 class="section-title">Pending Updates <span id="pendingCount">0</span></h3>
                <div class="pending-grid" id="pendingContainer">
                    <!-- Populated via JS -->
                </div>
            </div>

            <!-- My Clients -->
            <div class="glass clients-card">
                <h3 class="section-title">My Clients <span id="clientCount">0</span></h3>
                <table class="clients-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Current Weight</th>
                            <th>Goal Weight</th>
                            <th>Streak</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTableBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Assign Plan -->
            <div class="glass clients-card">
                <h3 class="section-title">Assign Plan</h3>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <select id="assignPlanSelect" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:15px; border-radius:12px; outline:none; font-family:inherit;">
                        <option value="">Select a Client...</option>
                    </select>
                    <button class="btn-approve" onclick="assignPlan()" style="padding: 15px 25px; border-radius: 12px;">Send Plan</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <textarea id="dietPlanInput" placeholder="Write diet plan..." rows="4" style="background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; padding:15px; border-radius:12px; resize:none; outline:none; font-family:inherit;"></textarea>
                    <textarea id="exercisePlanInput" placeholder="Write exercise plan..." rows="4" style="background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; padding:15px; border-radius:12px; resize:none; outline:none; font-family:inherit;"></textarea>
                </div>
            </div>

        </div>

        <!-- Right Column: Integrated Chat -->
        <div class="chat-col" id="chatCol">
            <div class="glass chat-card">
                <div class="chat-header">
                    <div class="chat-header-avatar">
                        <img id="chatHeaderAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" style="width:100%; border-radius:50%;">
                    </div>
                    <div class="chat-header-info">
                        <h4 id="chatHeaderName">Client Name</h4>
                    </div>
                    <span onclick="closeChat()" style="cursor:pointer; font-size: 1.2rem; color: #888; margin-left: auto;">✕</span>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <!-- Populated via JS -->
                </div>

                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Message...">
                    <button class="chat-send" id="chatSendBtn">➤</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="http://localhost:5001/socket.io/socket.io.js"></script>
<script src="js/trainer.js"></script>

</body>
</html>

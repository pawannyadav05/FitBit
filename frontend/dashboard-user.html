<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard - FitForge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
:root {
    --accent: #c6ff00;
    --bg-dark: #0a0a0a;
    --card-bg: #141414;
    --border: #252525;
    --text-dim: #888888;
}

body {
    margin: 0;
    background: var(--bg-dark);
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    line-height: 1.5;
}

.dashboard {
    width: 100%;
    max-width: 550px;
    padding: 50px 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.header h2 {
    color: var(--accent);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    margin: 0;
}

.logout {
    color: #ff4d4d;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.2s;
}

.logout:hover { opacity: 0.7; }

.profile {
    background: var(--card-bg);
    padding: 40px 30px;
    border-radius: 24px;
    margin-bottom: 30px;
    border: 1px solid var(--border);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.profile img {
    width: 110px;
    height: 110px;
    border-radius: 30px;
    border: 2px solid var(--border);
    margin-bottom: 20px;
}

#userName {
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.5px;
}

#userId {
    color: var(--text-dim);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.9rem;
    margin: 8px 0 20px 0;
}

.status {
    background: var(--accent);
    color: black;
    padding: 6px 20px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 0.75rem;
    text-transform: uppercase;
    display: inline-block;
}

.qr-container {
    margin-top: 35px;
    padding: 20px;
    background: white;
    border-radius: 20px;
    display: inline-block;
    transition: transform 0.3s ease;
}

.qr-container:hover { transform: scale(1.02); }

#qrCode {
    width: 200px !important;
    height: 200px !important;
}

.card {
    background: var(--card-bg);
    padding: 35px;
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.card h3 {
    margin: 0 0 25px 0;
    font-size: 1.2rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.card p {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid #1f1f1f;
    margin: 0;
    color: var(--text-dim);
    font-size: 0.95rem;
}

.card p span {
    color: white;
    font-weight: 600;
}

.progress-bar {
    height: 12px;
    background: #1f1f1f;
    border-radius: 10px;
    margin-top: 30px;
    overflow: hidden;
}

.progress {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #9ecb00);
    border-radius: 10px;
    transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.chat-btn {
    position: fixed;
    bottom: 35px;
    right: 35px;
    background: var(--accent);
    width: 65px;
    height: 65px;
    border-radius: 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 28px;
    box-shadow: 0 10px 25px rgba(198, 255, 0, 0.2);
    transition: 0.3s;
}

.chat-btn:hover { transform: translateY(-5px) rotate(5deg); }

.chat-box {
    position: fixed;
    bottom: 115px;
    right: 35px;
    width: 340px;
    background: #121212;
    border-radius: 24px;
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.chat-header {
    background: var(--accent);
    color: black;
    padding: 18px 20px;
    font-weight: 800;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-messages {
    height: 280px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-messages div {
    align-self: flex-start !important;
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 0.9rem;
    line-height: 1.4;
}

.chat-input {
    display: flex;
    padding: 15px;
    background: #0a0a0a;
    border-top: 1px solid var(--border);
}

.chat-input input {
    flex: 1;
    padding: 12px 18px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: white;
    border-radius: 12px;
    outline: none;
}

.chat-input button {
    background: var(--accent);
    border: none;
    padding: 0 20px;
    margin-left: 10px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
}
</style>
</head>

<body>

<div class="dashboard">
    <div class="header">
        <h2>FitForge</h2>
        <p class="logout">Logout</p>
    </div>

    <div class="profile">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User">
        <p id="userName">User Name</p>
        <p id="userId">ID</p>
        <div id="membershipStatus" class="status">Active</div>
        
        <br>
        <div class="qr-container">
            <canvas id="qrCode"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Fitness Stats</h3>
        <p>Height <span><span id="height"></span> cm</span></p>
        <p>Weight <span><span id="weight"></span> kg</span></p>
        <p>Goal <span><span id="goal"></span> kg</span></p>
        <p>BMI <span id="bmi"></span></p>
        <p>Streak <span><span id="streak"></span> days</span></p>

        <div class="progress-bar">
            <div id="progressBar" class="progress"></div>
        </div>
    </div>
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatBox" class="chat-box">
    <div class="chat-header">
        <span>FORGE AI</span>
        <span onclick="toggleChat()" style="cursor:pointer; font-size: 1.2rem;">✕</span>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input">
        <input id="chatInput" placeholder="Ask anything...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="js/user.js"></script>

</body>
</html>
